<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Live Scoring — Prototype</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  body { background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; padding: 1.5rem; }
  .card-x { background: #1e293b; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .team-name { font-weight: 700; font-size: 1.1rem; }
  .coin-total { font-size: 2rem; font-weight: 800; }
  .player-block { background: #0f172a; border-radius: 10px; padding: 0.75rem; margin-bottom: 0.6rem; }
  .player-name { font-weight: 700; margin-bottom: 0.5rem; }
  .stat-row { display: flex; align-items: center; justify-content: space-between; padding: 0.3rem 0; border-top: 1px solid #1e293b; }
  .stat-row:first-of-type { border-top: none; }
  .stat-label { font-size: 0.8rem; color: #94a3b8; }
  .stat-val { font-weight: 700; min-width: 2.5ch; text-align: center; }
  .btn-round { width: 30px; height: 30px; border-radius: 50%; padding: 0; line-height: 1; font-size: 0.85rem; }
  .queen-badge { cursor: pointer; }
  .toss-input { max-width: 320px; }
  .nrr-val { font-family: ui-monospace, monospace; }
  .timer-card { display: flex; flex-wrap: wrap; gap: 1.25rem; align-items: center; }
  .timer-block { text-align: center; min-width: 140px; }
  .timer-label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
  .timer-val { font-family: ui-monospace, monospace; font-size: 2rem; font-weight: 800; }
  .timer-val.warn { color: #f59e0b; }
  .timer-val.danger { color: #ef4444; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .timer-controls { display: flex; gap: 0.4rem; justify-content: center; margin-top: 0.4rem; }
  .submit-block { margin-left: auto; text-align: center; }
  .queen-row { display: flex; flex-wrap: wrap; gap: 0.6rem; }
  .queen-btn { display: flex; align-items: center; gap: 0.4rem; }
  .queen-btn.taken { opacity: 0.55; }
  .modal-backdrop-x { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1050; align-items: center; justify-content: center; }
  .modal-backdrop-x.show { display: flex; }
  .modal-box { background: #1e293b; border-radius: 12px; padding: 1.5rem; width: 100%; max-width: 420px; }
  .winner-options { display: flex; gap: 0.6rem; margin-bottom: 1rem; }
  .winner-options .btn { flex: 1; }
  .margin-row { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 1rem; }
  .margin-val { font-size: 1.8rem; font-weight: 800; min-width: 3ch; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <h3 class="mb-1"><i class="fa-solid fa-flag-checkered me-2"></i>Live Scoring — Prototype</h3>
  <p class="text-muted small mb-3">Matches the official scorecard columns: Points Scored, Queen Acquired, Dues Scored, Fouls Scored, Consecutive Shots.</p>

  <div class="card-x timer-card">
    <div class="timer-block">
      <div class="timer-label"><i class="fa-solid fa-stopwatch me-1"></i>Shot Clock (30s)</div>
      <div class="timer-val" id="shotClockVal">30</div>
      <div class="timer-controls">
        <button class="btn btn-sm btn-success" id="shotStart"><i class="fa-solid fa-play"></i></button>
        <button class="btn btn-sm btn-outline-light" id="shotReset"><i class="fa-solid fa-rotate-right"></i></button>
      </div>
    </div>
    <div class="timer-block">
      <div class="timer-label"><i class="fa-solid fa-hourglass-half me-1"></i>Match Timer (20:00)</div>
      <div class="timer-val" id="matchClockVal">20:00</div>
      <div class="timer-controls">
        <button class="btn btn-sm btn-success" id="matchStartBtn"><i class="fa-solid fa-play"></i></button>
        <button class="btn btn-sm btn-warning" id="matchPauseBtn"><i class="fa-solid fa-pause"></i></button>
        <button class="btn btn-sm btn-outline-light" id="matchResetBtn"><i class="fa-solid fa-rotate-right"></i></button>
      </div>
    </div>
    <div class="submit-block">
      <button class="btn btn-lg btn-primary" id="openSubmitModal"><i class="fa-solid fa-check me-2"></i>Submit Result</button>
    </div>
  </div>

  <div class="card-x">
    <label class="form-label small text-muted mb-1">Toss Won by</label>
    <select class="form-select toss-input" id="tossInput">
      <option value="">Select team...</option>
    </select>
  </div>

  <div class="card-x">
    <div class="d-flex justify-content-between align-items-center mb-2">
      <label class="form-label small text-muted mb-0">Queen Acquired</label>
      <button class="btn btn-sm btn-outline-danger" id="queenResetBtn"><i class="fa-solid fa-rotate-left me-1"></i>Reset</button>
    </div>
    <div class="queen-row" id="queenRow"></div>
  </div>

  <div class="card-x" id="resultCard" style="display:none;"></div>

  <div class="row g-3">
    <div class="col-md-6" id="teamA"></div>
    <div class="col-md-6" id="teamB"></div>
  </div>
</div>

<div class="modal-backdrop-x" id="submitModal">
  <div class="modal-box">
    <h5 class="mb-3"><i class="fa-solid fa-trophy me-2"></i>Submit Match Result</h5>
    <div class="winner-options">
      <button class="btn btn-outline-light" data-winner="A" id="winnerA">Team A Won</button>
      <button class="btn btn-outline-light" data-winner="draw" id="winnerDraw">Draw</button>
      <button class="btn btn-outline-light" data-winner="B" id="winnerB">Team B Won</button>
    </div>
    <div id="nrrLeaderSection" style="display:none;">
      <label class="form-label small text-muted mb-1 d-block text-center">Leading in NRR</label>
      <div class="winner-options" id="nrrLeaderOptions">
        <button class="btn btn-outline-light" data-nrr-leader="A" id="nrrLeaderA">Team A</button>
        <button class="btn btn-outline-light" data-nrr-leader="B" id="nrrLeaderB">Team B</button>
      </div>
    </div>
    <div id="marginSection" style="display:none;">
      <label class="form-label small text-muted mb-1 d-block text-center" id="marginLabel">NRR Margin</label>
      <div class="margin-row">
        <button class="btn btn-outline-light btn-round" id="marginMinus">−</button>
        <span class="margin-val" id="marginVal">0</span>
        <button class="btn btn-info btn-round" id="marginPlus">+</button>
      </div>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-secondary flex-fill" id="closeSubmitModal">Cancel</button>
      <button class="btn btn-success flex-fill" id="confirmSubmit">Confirm</button>
    </div>
  </div>
</div>

<script>
const SHOT_CLOCK_SECONDS = 30;
const MATCH_MINUTES = 20;

const timers = {
  shot: { remaining: SHOT_CLOCK_SECONDS, running: false, interval: null },
  match: { remaining: MATCH_MINUTES * 60, running: false, interval: null, elapsedForNrr: 0 },
};

const state = {
  toss: '',
  queenTakenBy: null, // player id, once set no other player can take it
  result: null, // { winner: 'A'|'B'|'draw', margin: number }
  teams: {
    A: {
      name: 'Team A',
      players: [
        { id: 'A1', name: 'Player 1', points: 0, dues: 0, fouls: 0, streak: 0 },
        { id: 'A2', name: 'Player 2', points: 0, dues: 0, fouls: 0, streak: 0 },
      ],
    },
    B: {
      name: 'Team B',
      players: [
        { id: 'B1', name: 'Player 1', points: 0, dues: 0, fouls: 0, streak: 0 },
        { id: 'B2', name: 'Player 2', points: 0, dues: 0, fouls: 0, streak: 0 },
      ],
    },
  },
};

function fmtClock(totalSeconds) {
  const m = Math.floor(totalSeconds / 60);
  const s = totalSeconds % 60;
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function renderTimers() {
  const shotEl = document.getElementById('shotClockVal');
  shotEl.textContent = timers.shot.remaining;
  shotEl.className = 'timer-val' + (timers.shot.remaining <= 5 ? ' danger' : timers.shot.remaining <= 10 ? ' warn' : '');

  const matchEl = document.getElementById('matchClockVal');
  matchEl.textContent = fmtClock(timers.match.remaining);
  matchEl.className = 'timer-val' + (timers.match.remaining <= 60 ? ' danger' : timers.match.remaining <= 300 ? ' warn' : '');
}

function startShotClock() {
  clearInterval(timers.shot.interval);
  timers.shot.running = true;
  timers.shot.interval = setInterval(() => {
    timers.shot.remaining -= 1;
    if (timers.shot.remaining <= 0) {
      timers.shot.remaining = 0;
      clearInterval(timers.shot.interval);
      timers.shot.running = false;
    }
    renderTimers();
  }, 1000);
}

function resetShotClock() {
  clearInterval(timers.shot.interval);
  timers.shot.running = false;
  timers.shot.remaining = SHOT_CLOCK_SECONDS;
  renderTimers();
}

function startMatchClock() {
  if (timers.match.running) return;
  timers.match.running = true;
  timers.match.interval = setInterval(() => {
    timers.match.remaining -= 1;
    if (timers.match.remaining <= 0) {
      timers.match.remaining = 0;
      clearInterval(timers.match.interval);
      timers.match.running = false;
    }
    renderTimers();
    render();
  }, 1000);
}

function pauseMatchClock() {
  clearInterval(timers.match.interval);
  timers.match.running = false;
}

function resetMatchClock() {
  clearInterval(timers.match.interval);
  timers.match.running = false;
  timers.match.remaining = MATCH_MINUTES * 60;
  renderTimers();
  render();
}

function playerBlock(teamKey, p) {
  return `
    <div class="player-block">
      <div class="player-name">${p.name}</div>

      <div class="stat-row">
        <span class="stat-label">Points Scored</span>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-sm btn-outline-light btn-round" data-action="points-minus" data-team="${teamKey}" data-player="${p.id}">−</button>
          <span class="stat-val">${p.points}</span>
          <button class="btn btn-sm btn-success btn-round" data-action="points-plus" data-team="${teamKey}" data-player="${p.id}">+</button>
        </div>
      </div>
      <div class="stat-row">
        <span class="stat-label">Dues Scored</span>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-sm btn-outline-light btn-round" data-action="dues-minus" data-team="${teamKey}" data-player="${p.id}">−</button>
          <span class="stat-val">${p.dues}</span>
          <button class="btn btn-sm btn-primary btn-round" data-action="dues-plus" data-team="${teamKey}" data-player="${p.id}">+</button>
        </div>
      </div>
      <div class="stat-row">
        <span class="stat-label">Fouls Scored</span>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-sm btn-outline-light btn-round" data-action="fouls-minus" data-team="${teamKey}" data-player="${p.id}">−</button>
          <span class="stat-val">${p.fouls}</span>
          <button class="btn btn-sm btn-warning btn-round" data-action="fouls-plus" data-team="${teamKey}" data-player="${p.id}">+</button>
        </div>
      </div>
      <div class="stat-row">
        <span class="stat-label">Consecutive Shots</span>
        <div class="d-flex align-items-center gap-2">
          <button class="btn btn-sm btn-outline-light btn-round" data-action="streak-minus" data-team="${teamKey}" data-player="${p.id}">−</button>
          <span class="stat-val">${p.streak}</span>
          <button class="btn btn-sm btn-info btn-round" data-action="streak-plus" data-team="${teamKey}" data-player="${p.id}">+</button>
        </div>
      </div>
    </div>
  `;
}

function teamCard(teamKey) {
  const team = state.teams[teamKey];
  const total = team.players.reduce((s, p) => s + p.points, 0);
  return `
    <div class="card-x">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <span class="team-name">${team.name}</span>
        <span class="coin-total">${total}</span>
      </div>
      ${team.players.map(p => playerBlock(teamKey, p)).join('')}
    </div>
  `;
}

function allPlayers() {
  return [
    ...state.teams.A.players.map(p => ({ ...p, teamKey: 'A' })),
    ...state.teams.B.players.map(p => ({ ...p, teamKey: 'B' })),
  ];
}

function renderQueenRow() {
  const row = document.getElementById('queenRow');
  row.innerHTML = allPlayers().map(p => {
    const taken = state.queenTakenBy !== null;
    const isThisOne = state.queenTakenBy === p.id;
    return `
      <button class="btn btn-sm ${isThisOne ? 'btn-danger' : 'btn-outline-light'} queen-btn ${taken && !isThisOne ? 'taken' : ''}"
        data-action="queen-take" data-player="${p.id}" data-team="${p.teamKey}" ${taken ? 'disabled' : ''}>
        <i class="fa-solid fa-crown"></i> ${state.teams[p.teamKey].name} — ${p.name}
      </button>
    `;
  }).join('');
}

function render() {
  document.getElementById('teamA').innerHTML = teamCard('A');
  document.getElementById('teamB').innerHTML = teamCard('B');
  renderQueenRow();
}

function renderTossOptions() {
  const sel = document.getElementById('tossInput');
  const current = state.toss;
  sel.innerHTML = `
    <option value="">Select team...</option>
    <option value="A">${state.teams.A.name}</option>
    <option value="B">${state.teams.B.name}</option>
  `;
  sel.value = current;
}

document.getElementById('tossInput').addEventListener('change', (e) => {
  state.toss = e.target.value;
});

renderTossOptions();

document.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  const team = state.teams[btn.dataset.team];
  const player = btn.dataset.player ? team.players.find(p => p.id === btn.dataset.player) : null;

  if (action === 'points-plus') {
    player.points += 1;
    resetShotClock();
  } else if (action === 'points-minus') {
    player.points = Math.max(0, player.points - 1);
  } else if (action === 'dues-plus') {
    player.dues += 1;
  } else if (action === 'dues-minus') {
    player.dues = Math.max(0, player.dues - 1);
  } else if (action === 'fouls-plus') {
    player.fouls += 1;
    resetShotClock();
  } else if (action === 'fouls-minus') {
    player.fouls = Math.max(0, player.fouls - 1);
  } else if (action === 'streak-plus') {
    player.streak += 1;
  } else if (action === 'streak-minus') {
    player.streak = Math.max(0, player.streak - 1);
  } else if (action === 'queen-take') {
    if (state.queenTakenBy === null) state.queenTakenBy = btn.dataset.player;
  }
  render();
});

document.getElementById('queenResetBtn').addEventListener('click', () => {
  state.queenTakenBy = null;
  render();
});

document.getElementById('shotStart').addEventListener('click', startShotClock);
document.getElementById('shotReset').addEventListener('click', resetShotClock);
document.getElementById('matchStartBtn').addEventListener('click', startMatchClock);
document.getElementById('matchPauseBtn').addEventListener('click', pauseMatchClock);
document.getElementById('matchResetBtn').addEventListener('click', resetMatchClock);

// --- Submit result modal ---
const submitModal = document.getElementById('submitModal');
let pendingWinner = null;
let pendingNrrLeader = null;
let pendingMargin = 0;

function renderModal() {
  ['A', 'draw', 'B'].forEach(w => {
    const id = w === 'draw' ? 'winnerDraw' : `winner${w}`;
    document.getElementById(id).className = 'btn ' + (pendingWinner === w ? 'btn-primary' : 'btn-outline-light');
  });

  const leaderSection = document.getElementById('nrrLeaderSection');
  const marginSection = document.getElementById('marginSection');
  const marginLabel = document.getElementById('marginLabel');

  if (pendingWinner === 'A' || pendingWinner === 'B') {
    // Winner is fixed as the NRR leader — no separate choice needed.
    pendingNrrLeader = pendingWinner;
    leaderSection.style.display = 'none';
    marginSection.style.display = 'block';
    marginLabel.textContent = `Team ${pendingWinner} NRR Margin`;
  } else if (pendingWinner === 'draw') {
    leaderSection.style.display = 'block';
    marginSection.style.display = pendingNrrLeader ? 'block' : 'none';
    marginLabel.textContent = pendingNrrLeader ? `Team ${pendingNrrLeader} NRR Margin` : '';
  } else {
    leaderSection.style.display = 'none';
    marginSection.style.display = 'none';
  }

  ['A', 'B'].forEach(t => {
    document.getElementById(`nrrLeader${t}`).className = 'btn ' + (pendingNrrLeader === t ? 'btn-info' : 'btn-outline-light');
  });
  document.getElementById('marginVal').textContent = pendingMargin;
}

document.getElementById('openSubmitModal').addEventListener('click', () => {
  pendingWinner = state.result?.winner ?? null;
  pendingNrrLeader = state.result?.nrrLeader ?? null;
  pendingMargin = state.result?.margin ?? 0;
  renderModal();
  submitModal.classList.add('show');
});

document.getElementById('closeSubmitModal').addEventListener('click', () => {
  submitModal.classList.remove('show');
});

['winnerA', 'winnerDraw', 'winnerB'].forEach(id => {
  document.getElementById(id).addEventListener('click', (e) => {
    const newWinner = e.currentTarget.dataset.winner;
    if (newWinner === 'draw' && pendingWinner !== 'draw') pendingNrrLeader = null;
    pendingWinner = newWinner;
    renderModal();
  });
});

['nrrLeaderA', 'nrrLeaderB'].forEach(id => {
  document.getElementById(id).addEventListener('click', (e) => {
    pendingNrrLeader = e.currentTarget.dataset.nrrLeader;
    renderModal();
  });
});

document.getElementById('marginPlus').addEventListener('click', () => {
  pendingMargin += 1;
  renderModal();
});
document.getElementById('marginMinus').addEventListener('click', () => {
  pendingMargin = Math.max(0, pendingMargin - 1);
  renderModal();
});

function renderResultCard() {
  const card = document.getElementById('resultCard');
  if (!state.result) { card.style.display = 'none'; return; }
  const { winner, nrrLeader, margin } = state.result;
  const nrrA = nrrLeader === 'A' ? margin : 0;
  const nrrB = nrrLeader === 'B' ? margin : 0;
  const resultText = winner === 'draw'
    ? 'Match Drawn'
    : `${state.teams[winner].name} Won`;
  card.style.display = 'block';
  card.innerHTML = `
    <div class="d-flex justify-content-between align-items-center mb-2">
      <strong><i class="fa-solid fa-trophy me-2"></i>${resultText}</strong>
    </div>
    <div class="d-flex justify-content-between">
      <span>${state.teams.A.name} — NRR <strong>${nrrA}</strong></span>
      <span>${state.teams.B.name} — NRR <strong>${nrrB}</strong></span>
    </div>
    ${winner === 'draw' ? `<div class="text-muted small mt-1">Leading in NRR: ${state.teams[nrrLeader].name}</div>` : ''}
  `;
}

document.getElementById('confirmSubmit').addEventListener('click', () => {
  if (!pendingWinner || !pendingNrrLeader) return;
  state.result = { winner: pendingWinner, nrrLeader: pendingNrrLeader, margin: pendingMargin };
  submitModal.classList.remove('show');
  renderResultCard();
});

renderTimers();
render();
renderResultCard();
</script>
</body>
</html>
